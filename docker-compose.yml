services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: zhaobiao_qdrant
    ports:
      - "6333:6333"
      - "6334:6334" # gRPC（可选）
    volumes:
      - qdrant_data:/qdrant/storage
  app:
    build: .
    container_name: zhaobiao_app
    ports:
      - "8501:8501"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      qdrant:
        condition: service_started
    restart: unless-stopped

volumes:
  qdrant_data:
